<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0e17">
  <title>Beam · 屏幕共享直播间</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect x='2' y='4' width='20' height='13' rx='3' fill='%236d6bfb'/%3E%3Cpath d='M10 8.5v4l3.5-2z' fill='white'/%3E%3Crect x='8' y='19' width='8' height='2' rx='1' fill='%236d6bfb'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <!-- ========== 首页 ========== -->
  <main id="view-home" class="view view-home">
    <div class="home-card">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="4" width="20" height="13" rx="3" fill="url(#logoGrad)"/>
          <path d="M10 8.5v4l3.5-2z" fill="white"/>
          <rect x="8" y="19" width="8" height="2" rx="1" fill="url(#logoGrad)"/>
          <defs>
            <linearGradient id="logoGrad" x1="2" y1="4" x2="22" y2="21" gradientUnits="userSpaceOnUse">
              <stop stop-color="#7c7ffb"/><stop offset="1" stop-color="#5a54f0"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1>Beam</h1>
      <p class="tagline">共享或接收屏幕</p>

      <label class="field-label" for="name-input">你的昵称</label>
      <input id="name-input" class="text-input" maxlength="16" placeholder="怎么称呼你？" autocomplete="off">

      <button id="create-btn" class="btn btn-primary btn-lg">创建房间</button>

      <div class="divider"><span>或加入已有房间</span></div>

      <div class="join-row">
        <input id="code-input" class="text-input code-input" maxlength="6" placeholder="房间码" autocomplete="off" spellcheck="false">
        <button id="join-btn" class="btn btn-ghost">加入</button>
      </div>
    </div>
    <footer class="home-footer">建议使用 Chrome 或 Edge 浏览器，共享系统声音时请在弹窗中勾选「分享音频」</footer>
  </main>

  <!-- ========== 房间页 ========== -->
  <main id="view-room" class="view view-room hidden">
    <header class="room-header">
      <div class="brand">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="4" width="20" height="13" rx="3" fill="#6d6bfb"/>
          <path d="M10 8.5v4l3.5-2z" fill="white"/>
          <rect x="8" y="19" width="8" height="2" rx="1" fill="#6d6bfb"/>
        </svg>
        <span>Beam</span>
      </div>

      <div class="room-code-chip">
        <span class="chip-label">房间码</span>
        <span class="code" id="room-code-label">------</span>
        <button id="copy-link-btn" class="chip-btn" title="复制邀请链接">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          邀请
        </button>
      </div>

      <div class="header-right">
        <span id="member-count" class="pill">1 / 3</span>
        <button id="leave-btn" class="btn btn-danger-ghost">离开</button>
      </div>
    </header>

    <section class="stage" id="stage">
      <video id="stage-video" autoplay playsinline class="hidden"></video>

      <div class="stage-empty" id="stage-empty">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="13" rx="3"/><path d="M8 21h8"/><path d="M12 17v4"/>
          </svg>
        </div>
        <p class="empty-title" id="empty-title">暂时没有人在共享屏幕</p>
        <p class="empty-hint" id="empty-hint">点击下方「开始共享屏幕」，把你的画面带给大家</p>
      </div>

      <!-- OBS 推流面板：仅演示者可见，等待/掉线时覆盖在舞台上 -->
      <div class="obs-panel hidden" id="obs-panel">
        <h3>
          <span class="obs-dot" id="obs-dot"></span>
          OBS 推流模式
        </h3>
        <p class="obs-status" id="obs-status">等待 OBS 开始推流…</p>
        <div class="obs-url-row">
          <code id="obs-url">…</code>
          <button id="obs-copy-btn" class="btn btn-primary">复制推流地址</button>
        </div>
        <ol class="obs-steps">
          <li>OBS「设置 → 直播」：服务选 <b>WHIP</b>，把上面的地址粘贴到「服务器」，Bearer 令牌留空</li>
          <li>回到 OBS 主界面，点「<b>开始直播</b>」</li>
          <li>画面会自动出现在这里，房间里所有人同步看到</li>
        </ol>
      </div>

      <div class="click-to-play hidden" id="click-to-play">
        <button id="play-btn" class="btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.4 5.6a9 9 0 0 1 0 12.8"/>
          </svg>
          点击开启声音
        </button>
      </div>

      <div class="stage-bar hidden" id="stage-bar">
        <span class="presenter-label" id="presenter-label"></span>
        <span class="stats-line" id="stats-line" title="连接诊断：直连/中继 · 延迟 · 码率 · 丢包"></span>
        <div class="stage-controls" id="remote-controls">
          <button id="mute-btn" class="icon-btn" title="静音 / 取消静音">
            <svg id="icon-sound-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.4 5.6a9 9 0 0 1 0 12.8"/>
            </svg>
            <svg id="icon-sound-off" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 5 6 9H2v6h4l5 4V5z"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
            </svg>
          </button>
          <input type="range" id="volume-slider" min="0" max="100" value="100" title="音量">
        </div>
        <button id="fullscreen-btn" class="icon-btn" title="全屏">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
          </svg>
        </button>
      </div>
    </section>

    <footer class="room-footer">
      <div class="members" id="members"></div>
      <div class="quality-picker hidden" id="quality-picker" title="卡顿时切「流畅」">
        <button data-q="smooth">流畅</button>
        <button data-q="balanced">平衡</button>
        <button data-q="hd">高清</button>
      </div>
      <button id="share-btn" class="btn btn-primary btn-share">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="13" rx="3"/><path d="m9 13 3-3 3 3"/><path d="M12 10v6"/>
        </svg>
        <span id="share-btn-text">开始共享屏幕</span>
      </button>
      <button id="obs-btn" class="btn btn-ghost btn-obs hidden" title="用 OBS 推流：画质更好，可用显卡编码">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/><path d="M12 3v2"/><path d="m18.4 8.6-1.8 1"/><path d="m5.6 8.6 1.8 1"/>
        </svg>
        <span>OBS 推流</span>
      </button>
    </footer>
  </main>

  <div id="toasts" class="toasts"></div>

  <script src="app.js"></script>
</body>
</html>
